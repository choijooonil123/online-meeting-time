services:
  - type: web
    name: online-meeting-time
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm --prefix server install
    startCommand: npm --prefix server start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: online-meeting-time-db
          property: connectionString
      - key: DATABASE_SSL
        value: "true"
      - key: FRONTEND_URL
        sync: false
      - key: APP_ORIGIN
        sync: false
      - key: SYSTEM_ADMIN_CODE
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false

databases:
  - name: online-meeting-time-db
    plan: free
    region: singapore
